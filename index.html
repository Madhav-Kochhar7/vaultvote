<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VaultVote — Transparent On-Chain Voting</title>
    <meta name="description" content="Decentralized voting on Ethereum Sepolia Testnet" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
<link href="https://cdn.jsdelivr.net/npm/@n8n/chat/dist/style.css" rel="stylesheet" />

<script type="module">
    import { createChat } from 'https://cdn.jsdelivr.net/npm/@n8n/chat/dist/chat.bundle.es.js';

    createChat({
        webhookUrl: 'https://arrsshh.app.n8n.cloud/webhook/6d5f43e6-6d12-4051-826f-7ef7d111a9ad/chat',
        // 'bubble' adds a floating button, which fixes the missing text box issue
        mode: 'bubble', 
        showWelcomeMessage: true,
        title: 'VoteVault Assistant',
        subtitle: 'Blockchain & MetaMask Support',
        initialMessages: [
            'नमस्ते! 👋 Welcome to VoteVault Assistant.',
            'I can help you with MetaMask setup, candidate manifests, or how to vote on-chain. What would you like to know?'
        ],
        // This block enables the message sending capability
        webhookConfig: {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            }
        },
        i18n: {
            en: {
                placeholder: 'Type your question here...',
            }
        },
        styleConfiguration: {
            backgroundColor: '#1a1a1a', 
            textColor: '#ffffff',
            primaryColor: '#00e5ff', // Cyan color to match your VoteChain theme
            fontFamily: 'Inter, system-ui, sans-serif'
        }
    });
</script>
  </body>
</html>
